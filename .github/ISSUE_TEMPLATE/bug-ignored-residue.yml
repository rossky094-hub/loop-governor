name: bug:ignored-residue
description: Report ignored residue classification or hygiene gate behavior.
title: "[bug:ignored-residue]: "
labels: ["bug:ignored-residue"]
body:
  - type: input
    id: loop_governor_version_or_commit
    attributes:
      label: Loop Governor version or commit
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node version
    validations:
      required: true
  - type: input
    id: git_version
    attributes:
      label: Git version
    validations:
      required: true
  - type: input
    id: os_shell
    attributes:
      label: OS and shell
    validations:
      required: true
  - type: textarea
    id: command_used
    attributes:
      label: Command used
      render: bash
    validations:
      required: true
  - type: textarea
    id: loop_contract
    attributes:
      label: Loop contract
      render: yaml
    validations:
      required: true
  - type: textarea
    id: config_validation_output
    attributes:
      label: Config validation output
      render: json
    validations:
      required: false
  - type: textarea
    id: raw_git_status_before_gate
    attributes:
      label: Raw git status before gate
      render: text
    validations:
      required: true
  - type: textarea
    id: classified_ignored_residue
    attributes:
      label: Classified ignored residue
      render: json
    validations:
      required: false
  - type: textarea
    id: gate_output_json
    attributes:
      label: Gate output JSON
      render: json
    validations:
      required: true
  - type: textarea
    id: raw_git_status_after_cleanup
    attributes:
      label: Raw git status after cleanup or final stop
      render: text
    validations:
      required: false
  - type: dropdown
    id: expected_decision
    attributes:
      label: Expected decision
      options:
        - continue
        - stop_for_user
        - update_rail
        - isolate_work
        - commit
        - reject_worker_output
        - write_plan
        - create_repair_path
    validations:
      required: true
  - type: input
    id: actual_decision
    attributes:
      label: Actual decision
    validations:
      required: true
